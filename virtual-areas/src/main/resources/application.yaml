spring:
  application:
    name: virtual-ms-java
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mariadb://${MARIADB_HOST:localhost}:3306/virtual_areas
    username: virtual_areas
    password: tcc-virtual-areas
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  grpc:
    server:
      port: 50052

server:
  port: 8082

eventhub:
  grpc:
    host: ${EVENTHUB_HOST:localhost}
    port: ${EVENTHUB_PORT:50051}

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:tcc-local-super-secret-token}
  org: ${INFLUXDB_ORG:tcc-org}
  bucket: ${INFLUXDB_BUCKET:projections}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

vaadin:
  push-mode: AUTOMATIC
  launch-browser: false
  production-mode: true
